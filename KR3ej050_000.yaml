body:
  text: 總論痘出於五臟疹由於六腑皆是命門相火一感時生發泄陰陽胎毒然痘出於五臟俱有見症而疹於肺居多何也蓋肺屬金清氣上浮而多嗽故疹未有不嗽者若嗽多者肺之鬱火也疹未有不喉痛者喉痛肺之竅塞也肺火上衝於喉故痛痛者啞之由也疹多腹痛大腸與肺相表裡肺火上衝於內故腹痛疹多泄瀉大腸為肺傳逮之官肺火下注故泄瀉疹多喘喘者肺氣大盛也疹多痰痰者肺火蒸腐也疹症不出於肺治疹之法初宜升提頭面背部俱出未至手足者用升中之輕降如未至爪甲者切不可重用降藥宜降中之升藥疹未出齊雖有梟毒烈火諸症只可用破敵之法如石膏大黃力子山楂荊芥乾葛佐以桔梗薄荷木通杏仁蘇子之類瘀血加赤芍紅花腹痛加桃仁青皮無汗加麻黃名曰完濟待至出齊重用栝蔞花粉生地丹參知母羚羊山梔黃芩舌上黑刺加犀角黃連鼻衄亦宜投咽痛加元參山豆根齦腫亦可用睛紅目痛加菊花木賊草柴胡之類蟲積肚痛加胡連使君子雷丸檳榔花椒然此類宜毒有未發之地後必餘火纏擾若下稠上疏須防收緊作喘之症當用大黃青皮以透之再加紫草赤芍以導其瘀徐徐收去方為無害切不可風吹致毛竅閉塞而即沒矣論汗疹之初出未出時俱宜微汗汗則肌膚通暢腠理開豁而毒自透一見微汗不宜過用升發之藥致使汗多亡陽輕者變重重者難救隱暗不透之症因之併發不可不慎又有無汗者何緣重感風寒使皮膚乾燥毛竅不開而疹不出多成內攻之患使腹脹氣喘秋夏宜微加升發春冬重以疏散但使渾身有微汗為妙又有痰鳴無分遲早急用寒涼降火清潤之藥佐以升發否則變為敗症故自始至終得汗為主若無汗後必多餘毒宜解毒為要秋夏微加升發湯升麻葛根蘇葉羌活赤芍甘草春冬重以疏散湯即升發湯加麻黃桂枝寒涼降火湯生地黃芩黃連山梔石膏花粉杏仁蘇子生甘草佐以升發湯薄荷山楂大力桔梗杏仁蘇子升麻麻症乾渴發熱論微熱壯熱乍熱潮熱復熱小兒口唇紅如丹是欲發渴皆內熱所致然宜辨其虛實二便閉是實用清熱和涼之藥二便清利唇口淡而渴是虛必其先食寒涼致中氣乾燥也急補中氣若腹脹不食是為敗症至於麻症有遠近不比於痘或三四日或五六日或八九日或半月又乍寒乍熱至壯熱經日不退是也若始熱遂見外疹又宜詳察有微熱者熱輕而不壯也此初起之時則猶可將出之時則不可恐其不能透表急用疏托之藥如沒當未盡沒時毒輕而清不必服藥若夫壯熱者熱甚而經日不退也初見太熱至出時而不稍退其症必重若先熱至出重是為順症如已出盡而有此壯熱宜服疏托和解之藥至沒後而熱不退更宜用和解之藥以免後患又有乍熱者或熱數日過數日又熱或乍熱或午熱未出之時見之總毒不透急宜疏托沒後及未沒見之毒有未盡宜涼解分利亦有因病後中氣虛弱者臨症者須酌治若夫潮熱者一日一至如潮之汛而不失也初出必無此症至出後沒後者有之此因氣血而作治宜益陰而退陽可也且有復熱者謂熱退而復發也皆因餘毒未解宜疏解為上妄用燥劑必致不治論下身冷全身冷疹之有下身冷者不比疫疾謂頭溫足冷作逆症看麻出自上故上熱而下冷若初起時上熱下冷不妨出完之時下身冷是逆症須詳審而治又有身體四肢如冰者麻本屬火全身自應溫暖今反冰冷必是逆症若初出正出之時不熱則毒不能盡出而反漸沒若正沒沒後有此者必脾胃倒壞氣血大虛毒不能盡後變無窮定為不治故不立法論口瘡口瘡者心脾之火多見於正沒之時皆因餘毒未盡留於上焦必大便閉小便赤宜清利脾火兼滑大腸為主若乳上小兒之母亦當服藥使乳清涼論腹痛疹之腹痛者毒氣內作而不能透表多見於初出正出之時治宜疏托發出即止如正沒未沒盡而痛緣外邪未盡而復於內亦宜疏托佐以清涼然細微處以意度之從外症加減論吐痰痰之吐有二有吐出如絲者有吐出成塊者皆由肺胃之火久積而作宜清肺消痰降火為主不可用南星半夏香燥溫脾之藥論唇舌乾燥唇舌破裂舌苔舌燥多屬於脾脾熱有二一則唇白而燥其熱尚微一則唇赤而燥其熱則重又有帶紫黑而燥其熱尤重治宜清熱分利而已何則舌乃心之苗麻本火候屬於心故舌苔有三種黃白黑是也白者微熱黃者雖重可治黑則難治此症不分始末不過清熱疏利而已舌破唇裂者此心脾二火盛上衝所致其色必深紅而紫黑亦有不紫紅而赤甚者其火不輕治當分首尾若初熱而色赤此火不解而毒不盡若其色有活猶可以治用寒涼加以疏托倘紫黑焦枯而色不活者不治若已出而有此症難治蓋毒雖出而唇舌破裂者心脾二經俱壞也若將沒之時有此亦危候也當謹慎細察為要論發斑發斑者火毒熾甚血被熬煎當以紫草紅花石膏等味涼血清火為主亦有初熱時為風寒所搏而成癮疹似斑非斑治宜疏解其癮自退若誤為真斑而用寒涼以致水瀉不止元氣下陷不能透表危亡立至可不慎諸論云暗疹如雲暗者上有大片紅腫者大片紅腫之間又有小顆粒於其上皆由火盛所致重用寒涼之藥不可遲緩如身上一片紅暗與皮內一片並樣此症只可發散若發散後仍如此者不治看疹諸色論疹色之美惡與痘無異紅活滋潤者吉有一樣色淡而潤是無內症其疹最清若淡而不潤或乾燥或嫩豔此不正之色火毒盛伏當清火解毒為要又有一樣深紅者其色紅而且重是血熱宜清散之又有一種豔紅者其色如胭脂是血熱其內必有火火遇火必發毒大用寒涼以先制其焰否則狂躁喘急立至又有一種乾紅者如紙之礬於紅滯而不活內有伏火血受其瘀顆粒必大嗽而必喘急用攻破又有一種色紫者是熱極將瘀急破血以涼之若帶豔則重甚矣又有一種色黯者其症較紫更重初出急破遲則難救若半靨色黯者無妨又有一種其色白者血瘀之極此是內症急破其瘀遲則倒靨面白故須山楂丹皮紅花大黃生地桃仁等劑如勻淨無內症身不熱不咳嗽是血不足而無火不必多治宜審之論咳嗽麻症之乾咳連聲不斷也因火旺肺躍凡疹先時喜咳咳甚則毛竅開而易透咳微則腠理閉而難透故方出之時欲其咳至既出之後欲其不咳為佳如仍有咳當以清痰降火為要若初起時不咳麻必不出於發散中加半夏以助其嗽使麻可出論鼻涕鼻衄鼻扇鼻通多涕此肺氣順也最吉故初出時至沒後而皆有是者此肺氣和平而不阻塞順症也不必服藥今云多涕謂濃涕而時有也非謂涕少而暫有臨症者宜推之若無涕鼻乾肺腑火熱閉塞毛竅不通初出未出時得此必重又有內為熱甚外為鼻眵所結至於無涕云其眵結而涕自見是肺氣通雖重可救如真有鼻乾無涕此症甚危亦輕沒後治宜詳審若下藥得噴嚏肺氣得解而通也將出未出之時必先外感而今得通故也其毒雖重可救正出而得此症其毒盡解又何後患又有衄血者因內熱狂盛邪血沸騰血從火化是以從肺而上溢於鼻名曰衄血將出未出之時而忽有衄是毒從衄解不必服藥至於久衄不可若出透與沒後有此症者宜於清肺藥中佐以涼血之味使火退而衄止如並口中有血者服涼劑不止惟用發散使毒得出而衄自止矣又有名為鼻扇者是肺氣將絶也喘滿喉鳴多屬於痰因火毒內結而亢甚若喉中無痰喘精神如故還可挽救急用潤肺消痰清熱為主否則難治論發搐疹之發搐不比尋常若喉中發痰非真搐也當分先後若見於發熱初出之候不妨治宜疏托引加清涼若見於正出已沒之時難治總要清上焦之熱兼利小便而已總附咳嗽諸方論凡疹回後有咳嗽者是火氣旺燥肺金受克故也治宜清金降火湯用黃芩黃連山梔石膏花粉貝母陳皮桑皮杏仁蘇子甘草麥冬栝蔞仁如不應外加葶藶枳殼若聲不出以清金降火湯作主再加葶藶倘有煩躁腹脹瀉痢不止聲啞唇青紫黑者宜用黃連解毒湯藥用黃芩黃連枳殼歸尾紅花赤芍生甘草大黃或用甘桔湯甘草桔梗力子玄參連翹知母杏仁乾薑若痰中帶血喘促悶亂用涼膈散黃芩山梔薄荷連翹生甘草大黃總附渴症諸方論凡疹渴有二者虛實是也看其舌苔起唇紅色有如丹二便閉此內熱所致內外皆實治宜清涼疏理之藥生地黃芩花粉牛蒡連翹荊芥葛根桔梗石膏黃連加燈草若唇口淡紅舌上無苔二便清調此是內虛宜清金益肺湯沙參麥冬生地丹參緑豆湯或芝麻茶炒米湯如氣喘腹脹是為敗症切不可飲冷水致生蓄水之患總附鼻涕鼻衄諸方論凡疹無涕者此因火旺鑠金治宜清金肺潤湯藥用知母黃芩生地花粉連翹蔞仁一疹有鼻衄者皆肺金鬱熱火沖之故當以葛根生地山梔薄荷丹皮茅根犀角羚羊角黃芩出齊之後而有此症當用犀角地黃湯加茵陳木通使火下行而愈犀角地黃湯生地犀角丹皮白芍加茵陳木通發水泡論疹有發水泡者此因火毒太甚迫於肌膚而不能透表故發水泡此症多於見點之時亦有於未見點之時皆為不治故不立法論氣促疹之有氣促者由肺不清而致當分先後若見於正出未出之時宜疏托若見於已出正沒之時宜降火清痰之藥眼閉論總附白珠赤珠疹有眼閉者常於沒後見之皆因脾火旺盛致目腫而閉但宜清上焦之藥兼以利水使熱退而眼自開矣又有白珠者又有赤紅者俱屬肺氣宜清肺火兼以風藥佐之齧牙論疹有齧牙者是陽陷於陰熱火相搏故齧牙耳其口必多渴手足俱熱喜食冷物治宜滋陰降火不可食辛辣之物若誤食之後必下血痰響而死論吐沫吐沫之症亦由胃火亢盛而致宜清胃降火為主治論蛔疹前吐蛔者毒火上衝胃難安養蛔從上出若初出發熱之時不妨待熱退身涼自然不吐亦宜清胃用生地當歸丹皮連翹石膏升麻庶無他症如已出回時而有此症用使君子黃芩川連花粉胡連川椒為主如蛔死者毒火猖獗胃氣將絶死期立至有瀉蛔者不必過治清解自愈如瀉死蛔者亦重論嘔吐疹有嘔吐者毒火沖胃未經發泄不必過治若出齊回後有此症宜用清涼解毒之藥論泄瀉疹有泄瀉者其色黃而有沫小便赤澀口乾唇燥此因肺經熱甚未出與當出之時而瀉者不必服藥經云毒以痢松但不宜久若回後有此泄者是積熱移於大腸治宜四苓散豬苓茯苓白朮澤瀉加黃芩黃連木通栝蔞仁霜如下有紅紫色總因熱毒留連藥宜赤芍大黃行一二次毒盡自愈不宜多下切不可因其泄瀉用訶蔻以止之恐其腹脹喘急而死如首尾水瀉小便短赤用木通車前利水之劑佐以升提可也論藥味所忌肺屬金輕清上浮切忌辛熱香燥蓋人參補肺防其肺熱還傷肺黃耆補中防其助痰而氣喘當歸辛熱助火反欲黨邪而為惡生地補腎腎為肺子經曰實則泄其子是腎宜瀉不宜補防風無汗乾燥須當表虛之堪憂他如乾薑附子白朮丁香砂仁肉桂細辛藿香蔻仁烏藥草蔻良薑茱萸蓽茇香附麝香等藥皆以辛香切宜禁用又忌食物如椒薑糖醋魚鱉蝦蟹豬犬牛羊馬肉並一切炙煿之物非特助邪為惡恐天行時氣必然重出要忌四十九日外有雞子不可食恐其壞目食糖恐犯牙疳獨有歸芎可於血虛色白者權宜酌用又有忌用大黃而用栝蔞何也蓋疹發於肺肺主氣經曰氣有餘便是火肺與大腸相表裡肺移熱於大腸故祕結用栝蔞仁以潤肺佐枳殼以寬腸則祕自通矣若大黃號曰將軍有斬將搴旗之功恐其太過致使心血兩虛則脾燥肺氣囂張風火益猛矣一疹當出之時被風寒所折以致色白如肌膚毛竅聳起如粟子者宜疏散用乾葛二錢木通二錢川芎八分紅花四錢陳皮一錢羌活一錢防