眩悶亂煩躁而死一看疹之法多於耳後項上腰腿先見其頂尖而不長其形小而勻淨者吉若色見紅者兼火化也輕症可治化斑湯主之如白者此血不足也養榮湯主之如色紫赤乾燥暗晦乃火盛毒熾也宜六一散四物湯加柴胡黃芩乾葛紅花力子連翹之類滋陰涼血而熱自除所謂養陰退陽之義也此亦五死一生之症外有大青龍湯入燒人屎亦妙如便祕者加酒大黃利之或元參解毒湯皆可選用若黑色者熱毒太甚為十死一生之症不可不明察而混施治也化斑湯人參知母石膏大力連翹升麻甘草地骨皮淡竹葉糯米水煎服養榮湯人參當歸紅花赤芍甘草水煎服六一散滑石六兩甘草一兩為細末量小兒大小每服一錢半或二錢本方加辰砂三錢名辰砂益元散四物湯當歸熟地白芍川芎大青龍湯玄參大青桔梗人中黃知母升麻石膏梔子木通水煎服元參解毒湯元參黃芩山梔桔梗甘草生地乾葛荊芥均分水煎服一疹表後紅影出於肌膚成片切戒風寒生冷如一犯之則皮膚閉塞毒氣壅滯遂變為渾身青紫而毒反內攻煩躁肚痛氣喘悶亂諸症作矣欲出不出危亡立至其可忽諸一疹已出而反沒者乃風寒所逼而然也若不早治毒成內攻以致癢塌而死急用消毒飲合升麻湯服之則疹復出而安矣升麻湯升麻乾葛白芷甘草薑蔥水煎熱服消毒飲荊芥力子甘草薑水煎服一發熱之時遍身出汗此毒從汗解玄府開疹易出也有出衄者此毒從衄解也俱不可遽止之若汗多血多皆不止此火甚逼迫太過致汗妄流血妄行也急宜當歸六黃湯以止汗茅化湯以止血遲則汗出多而元氣虛血出多而精神散難以治矣當歸六黃湯當歸黃耆黃連黃柏生地黃熟地黃均分水煎外加浮小麥止汗茅化湯茅化歸頭丹皮生地甘草加玄參百草霜水煎服一發熱時或嘔吐或自利或滯下此火邪內逼毒氣上行則吐下行則利毒太甚則裡急後重而為滯下也吐者竹茹石膏湯自利者升麻澤瀉湯下者黃芩芍藥湯加黃連生地木通當歸人參枳殼或少加大黃微下之竹茹石膏湯陳皮半夏石膏白茯苓甘草竹茹水煎服升麻澤瀉湯豬苓澤瀉赤苓石膏黃連甘草升麻均分水煎服黃芩芍藥湯條芩白芍升麻甘草水煎服一發熱之時未有不渴者但當以緑豆燈心湯入炒米飲之人參白虎湯佐之以生津解渴而已若恣飲冷水恐生水蓄之症故水入於肺為喘為嗽宜用葶藶以泄肺中之水水入於脾為腫為脹為自利宜用白茯苓生地木香以泄脾水水入於胃為嘔為噦為自利宜用豬苓澤瀉赤苓木通以泄心下之水水入於肝為脅痛用芫花以泄肝水水入於腎與膀胱為小便不利為陰囊腫用車前木通以泄腎及膀胱之水俱當因其症而治之人參白虎湯人參石膏知母甘草糯米煎服一疹出之時咽喉腫痛不能飲食者此毒火拂鬱上熏咽喉也宜用甘桔湯加元參大力連翹主之更以十全散若玉鎖匙吹之切不可妄用針刺出血也甘桔湯甘草桔梗十全散黃芩黃連各一錢五分苦參一錢元胡三分硼砂二分乳香二分兒茶雄黃各五分為細末每用少許蘆筒吹之玉鎖匙硼砂一錢朴硝五分殭蠶一條片腦五釐為末吹之一疹出之時咳嗽口乾心煩者此毒在心肺發未盡也用瀉白散若黃連杏仁湯麻疹作瀉加厚朴甘草瀉白散桑皮地骨皮甘草竹葉燈草水煎服黃連杏仁湯黃連陳皮杏仁麻黃枳殼乾葛薑水煎服一疹出之時自利不止或瀉稀水頻數者最為惡候但要看其疹若遍身稠密太盛或紫色或紅色甚者則無妨蓋毒在大腸非瀉則毒不解惟用平胃散加乾葛連翹以解之疹一發透依期收去自然瀉止若疹已收而瀉猶不止疹必未盡再用前藥加連翹川連大力木通澤瀉以分利之若用訶子肉蔻等則變肚痛脹滿喘急危矣平胃散蒼朮厚朴陳皮甘草一疹子之出常以六時收為度如子為陽午後收午後為陰子後收乃陽生陰成陰生陽成造化自然之妙也故漸出而漸收者其勢輕若一出之後熱不退延綿三四日而不收者此毒火太甚外發不盡內為有餘之邪所致須投化斑湯化斑湯人參知母石膏大力連翹升麻地骨皮甘草淡竹葉糯米水煎服三味消毒飲荊芥大力甘草生薑水煎服再加元參石膏桔梗為治一疹子出後自然退熱若遍身既出而猶拂拂煩熱頻作嘔吐者此毒尚未盡留連於肺胃之間宜化斑湯見前大便祕少加大黃利之一疹已收去反渾身發熱晝夜不退此毒未盡解邪火抑於肌肉之間久則毛髮乾焦皮膚枯槁肌肉羸瘦為骨蒸勞瘵之症急宜蘆薈肥兒丸加當歸連翹等治之遲則變為睡則露睛口鼻氣冷手足厥逆瘛瘲慢脾風不治之症矣蘆薈肥兒丸蘆薈龍膽草木香地骨皮使君子麥芽檳榔黃連白蕪荑胡黃連為細末豬膽汁為丸如黍米大每服五六十丸飲湯下一疹收之後身雖不羸瘦但時發壯熱煩躁不寧搐掣驚悸神昏志亂者此陰血衰耗致餘毒入肝而傳於心也宜養血安神四物湯加麥冬棗仁石菖蒲龍膽草茯苓黃連辰砂甘草竹葉燈心主之或以前藥為末蒸餅豬心血為丸服之亦可四物湯地黃當歸川芎白芍一疹毒入胃久而不散致成牙根黑爛血出為走馬疳傳與二頰浮腫久而穿頰破腮缺唇崩鼻為崩砂狐惑等危症外用文蛤散或雄黃散搽之內服蘆苔丸以清胃火或有愈者然不能多見也文蛤散文蛤一錢五分雄黃一錢五分棓子枯礬五釐蠶蛻下燒灰為末米泔漱口搽藥雄黃散雄黃一錢黃柏一錢麝香五分和勻以艾煎湯洗淨後搽藥末蘆薈丸人中白蘆薈使君子肉龍膽草黃連五靈脂均分共為細末浸蒸餅為丸白滾湯下一疹出之時曾作瀉痢未經清解至疹退之後變為休息痢不問赤白裡急後重晝夜無度頻並者此餘火毒在腸也須分虛實治之實者三黃丸利之虛者香連丸和之後用黃芩湯合益元散以養血行氣為治河間云養血則便膿自愈調氣則後重自除誠哉是言也三黃丸黃芩蒸黃連炒大黃蒸熱為末糊丸桐子大每服三十丸白湯下量兒大小虛實加減香連丸黃連一兩吳萸五兩同水拌勻燉滾水內半日取出炒乾揀去吳萸只用黃連為末再加木香一兩不見火為末和勻黃連末醋糊丸米湯下一二錢黃芩湯黃芩黃連當歸川芎木香青皮枳殼檳榔甘草水煎好入益元散調服益元散滑石六兩甘草一兩辰砂三錢為末量兒大小或一錢五分或二錢一疹退之後微微咳嗽者此餘毒未盡也用清肺飲加力子甘草治之若嗽甚氣喘連聲不止名為頓嗽甚至飲食湯水俱嗆出或咳出血者此熱毒乘肺而然也宜麥冬清肺飲加連翹主之如見胸高如圭肩聳而喘血從口鼻而出或擺手搖頭面色或白或青或紅以及枯暗者皆不可治之症也然亦有肺氣虛為毒所抑而發喘並無咳嗽出血嗆食等證者亦用麥冬清肺飲倍加人參治之切不可拘於肺熱之一端而純用清肺解毒之藥也麥冬清肺飲川貝天冬桔梗力子栝蔞知母麥冬杏仁兜鈴甘草加糯米水煎服一疹退之後聲啞不出或咳或喘或身熱不退以致日久不愈者此熱毒未盡肺金受克也宜清金降火湯加竹瀝生薑汁主之清金降火湯黃芩貝母栝蔞麥冬力子黑山梔知母杏仁元參麻黃石膏竹葉水煎服一疹退之後飲食如常動心如故猝然心腹絞痛遍身汗出如水者此元氣虛弱失於補養外雖無病內已虛損又為惡氣所中謂之中惡此朝發夕死之證急用養榮雙和湯救之如有積食加神麯麥芽如有熱去肉桂養榮雙和湯人參當歸熟地黃黃耆肉桂白芍麥冬甘草水煎服一疹退之後熱毒未盡或發癰毒四肢骨節疼痛者宜用羌活散黃酒沖服一二錢量大小強弱與之使其微汗微利而愈羌活散羌活穿山甲大黃全蠍皂角刺乳香一葉金白芷梢甘草一疹退之後餘熱未盡或熱甚而失血者犀角地黃合黃連解毒湯治之或四物湯加茵陳木通犀角之類以利小便使熱氣下行而愈也犀角地黃湯犀角白芍黑山梔生地黃丹皮黃芩紅花當歸甘草藕節水煎服黃連解毒湯黃連黃芩黃柏力子連翹黑山梔防風木通荊芥元參甘草竹葉四物湯見上一疹收之後餘熱未退日夜煩躁譫語昏狂者宜用益元散煎燈心湯下或五苓散去白朮肉桂加辰砂黃芩黃連治之若初發疹時即有煩躁譫語之證者升麻葛根湯加蔥白黃芩夏令再加石膏如或風盛者並加消風散兼調益元散服益元散滑石辰砂甘草五苓散茯苓豬苓白朮肉桂澤瀉升麻葛根湯升麻葛根赤芍力子木通連翹甘草水煎服一孕婦出疹者宜用四物湯加白朮黃芩艾葉等養胎清熱為主使胎無虞而疹易沒也如胎氣上攻急以苧麻根艾葉少許煎湯磨生檳榔服之更宜多服上藥為妙一熱毒蒸胎胎多受傷但胎雖傷而母實無恙也蓋疹與痘不同痘宜內實故胎落而母易亡疹宜內虛故胎去而母易存然與其胎去而母存孰若母子兩全之為愈也一出疹之症比較出痘似輕然調治失宜其禍反不旋踵蓋痘由胎毒而發其形勢輕重多少自可預斷至於疹子雖由感受邪氣而發然輕者可重重者可輕全在調治有方方保無虞故其飲食禁忌比痘為甚若食雞魚則終身皮膚粟起如雞皮之狀但遇天行出疹之時又要重出誤食油肉則每歲出疹之月必然下痢膿血誤食鹽醋即患咳嗽且遇出疹之時必復發咳誤食五辛之物不時驚熱必待過四十九日或百日之後始可無忌也
