front:
  text: 序自來醫之一道內症憑脈象外症憑形狀外症惟痘瘄最關緊要痘症見於古人坊本者甚多而於治瘄則尚略邇來痘瘄迥非昔比調治非時變為棘手吾郡袁氏沈氏虞氏有治瘄抄本其論症辨狀甚為了然對症用藥亦極詳慎爰糾同志登諸梨棗以廣厥傳至症之輕重時之寒熱地之燥濕則尤在高明者因宜增減諒不泥於古也長至節後三日東農主人謹序
